aid: wayve
name: Wayve
description: >-
  Wayve is a London-based embodied AI company pioneering AV2.0, an end-to-end,
  mapless, vehicle-agnostic approach to autonomous driving built on large-scale
  self-supervised learning rather than hand-engineered HD maps and rule stacks.
  Wayve's core technology stack includes the Wayve AI Driver (the production
  driving stack licensed to automakers), GAIA generative world models that
  synthesize realistic driving video from text and serve as simulators for
  policy training, and LINGO, a vision-language-action research line that uses
  natural language to train and explain driving decisions. Backed by SoftBank,
  Microsoft, NVIDIA, and Uber with a 1.5 billion USD funding round, Wayve is
  partnering with Nissan, Mercedes-Benz, and Stellantis on production
  programmes, and with Uber and Nissan on a Tokyo robotaxi launch. Wayve does
  not publish a public developer API; its public surface is research, press,
  and product positioning material.
